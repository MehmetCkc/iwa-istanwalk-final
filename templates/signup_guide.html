{% extends "base.html" %} {% block title %}Become A Guide — ISTANWALK{% endblock
%} {% block content %}
<section class="auth-shell">
  <div class="auth-art red">
    <img
      src="{{ url_for('static', filename='images/haydarpasa.jpg') }}"
      alt="Istanbul illustration"
    />
  </div>
  <form class="panel auth-panel" method="post">
    <header class="panel-head navy">Become A Guide</header>
    <div class="panel-body grid-form">
      <div>
        <label for="first_name">First name</label>
        <input id="first_name" name="first_name" type="text" required />
      </div>
      <div>
        <label for="last_name">Last name</label>
        <input id="last_name" name="last_name" type="text" required />
      </div>
      <div class="wide">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>
      <div class="wide">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />
      </div>
      <div class="wide">
        <span class="upload-label">Languages you know</span>
        <div class="language-grid">
          {% for language in languages %}
          <label class="language-chip">
            <input name="languages" type="checkbox" value="{{ language }}" />
            <span>{{ language }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
      <button class="btn navy full wide" type="submit">
        Create guide account
      </button>
    </div>
  </form>
</section>
{% endblock %}
